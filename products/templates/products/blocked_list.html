{% extends "base.html" %}
{% block content %}
<h2>차단된 게시물 관리</h2>
<div style="overflow-x:auto;">
<table style="width:100%;border-collapse:collapse;background:var(--paper);border-radius:12px;overflow:hidden;">
  <thead>
    <tr style="background:var(--yellow);text-align:left;">
      <th style="padding:12px 14px;">상품명</th>
      <th style="padding:12px 14px;">판매자</th>
      <th style="padding:12px 14px;">가격</th>
      <th style="padding:12px 14px;">등록일</th>
      <th style="padding:12px 14px;">관리</th>
    </tr>
  </thead>
  <tbody>
    {% for p in products %}
    <tr style="border-top:1px solid #F0E8DB;">
      <td style="padding:12px 14px;">{{ p.title }}</td>
      <td style="padding:12px 14px;"><a href="{% url 'profile' p.seller.username %}">{{ p.seller.username }}</a></td>
      <td style="padding:12px 14px;">{{ p.price }}원</td>
      <td style="padding:12px 14px;">{{ p.created_at|date:"Y-m-d" }}</td>
      <td style="padding:12px 14px;">
        <form method="post" action="{% url 'product_unblock' p.pk %}" style="margin:0;">
          {% csrf_token %}
          <button type="submit" class="btn-secondary">차단 해제</button>
        </form>
      </td>
    </tr>
    {% empty %}
    <tr><td style="padding:16px;" colspan="5">차단된 게시물이 없습니다.</td></tr>
    {% endfor %}
  </tbody>
</table>
</div>
{% endblock %}
